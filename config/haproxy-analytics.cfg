# haproxy-analytics.cfg — add to your existing HAProxy config
# Routes analytics.dapla.net → Plausible CE on 127.0.0.1:8000
#
# Assumes:
#   - TLS termination handled upstream (Cloudflare or HAProxy frontend)
#   - Plausible container PublishPort=127.0.0.1:8000:8000

frontend analytics_front
    bind *:80
    acl host_analytics hdr(host) -i analytics.dapla.net
    use_backend analytics_back if host_analytics

backend analytics_back
    option forwardfor
    option http-server-close
    http-request set-header X-Forwarded-Proto https
    server plausible 127.0.0.1:8000 check
