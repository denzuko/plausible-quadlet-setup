# examples/haproxy-plausible.cfg
# Additive stanza — copy relevant blocks into /etc/haproxy/haproxy.cfg
# analytics.dapla.net → Plausible CE on 127.0.0.1:8000
#
# Plausible CE binds PublishPort=127.0.0.1:8000:8000 — not externally exposed.
# TLS terminated at HAProxy (or upstream Cloudflare).
# Health check: GET / expect 200.

frontend http
    # Add inside existing frontend http block:
    acl host_analytics hdr(host) -i analytics.dapla.net
    use_backend plausible_back if host_analytics

backend plausible_back
    option forwardfor
    option http-server-close
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Host %[hdr(host)]
    server plausible 127.0.0.1:8000 check inter 10s
